server {
    listen 80;
    server_name app.cloubridge.com 159.65.18.32;

    root /var/www/cloudbridge/current/public;
    index index.php;

    location ^~ /api/router-metrics/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    location / {
        return 301 https://app.cloubridge.com$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    disable_symlinks off;
    server_name app.cloubridge.com;

    root /var/www/cloudbridge/current/public;
    index index.php;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/app.cloubridge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.cloubridge.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/cloudbridge-access.log;
    error_log /var/log/nginx/cloudbridge-error.log;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location ^~ /build/ {
        try_files $uri $uri/ /index.php?$query_string;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|txt|xml)$ {
        root /var/www/cloudbridge/current/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
