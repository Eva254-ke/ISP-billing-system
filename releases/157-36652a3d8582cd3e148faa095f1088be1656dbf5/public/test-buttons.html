<!DOCTYPE html>
<html>
<head>
    <title>Button Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/admin-overrides.css?v=20260507-1">
    <style>
        body { padding: 20px; background: #f1f5f9; }
        .test-area { background: white; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="test-area">
        <h3>Button Visibility Test</h3>
        
        <button class="btn btn-primary">Primary Button</button>
        <button class="btn btn-success">Success Button</button>
        <button class="btn btn-danger">Danger Button</button>
        <button class="btn btn-warning">Warning Button</button>
        
        <hr>
        
        <h4>Should see:</h4>
        <ul>
            <li>✅ All buttons visible</li>
            <li>✅ Proper gradients</li>
            <li>✅ Hover effects</li>
            <li>✅ No blur issues</li>
        </ul>
    </div>
</body>
</html>
